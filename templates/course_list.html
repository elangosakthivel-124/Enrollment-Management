<h2>Course List</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Course</th>
<th>Code</th>
<th>Instructor</th>
<th>Actions</th>
</tr>

{% for course in courses %}

<tr>
<td>{{ course.id }}</td>
<td>{{ course.course_name }}</td>
<td>{{ course.course_code }}</td>
<td>{{ course.instructor }}</td>

<td>
<a href="/edit-course/{{ course.id }}/">Edit</a>
|
<a href="/delete-course/{{ course.id }}/">Delete</a>
</td>

</tr>

{% endfor %}

</table>
