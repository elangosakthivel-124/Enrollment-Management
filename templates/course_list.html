<!DOCTYPE html>
<html>

<head>
<title>Courses</title>
</head>

<body>

<h2>Course List</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Course Name</th>
<th>Course Code</th>
<th>Instructor</th>
</tr>

{% for course in courses %}

<tr>
<td>{{ course.id }}</td>
<td>{{ course.course_name }}</td>
<td>{{ course.course_code }}</td>
<td>{{ course.instructor }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/add-course/">Add New Course</a>

</body>
</html>
