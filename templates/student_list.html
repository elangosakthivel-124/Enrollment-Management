<h2>Student List</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Actions</th>
</tr>

{% for student in students %}

<tr>
<td>{{ student.id }}</td>
<td>{{ student.name }}</td>
<td>{{ student.email }}</td>
<td>{{ student.phone }}</td>

<td>
<a href="/edit-student/{{ student.id }}/">Edit</a>
|
<a href="/delete-student/{{ student.id }}/">Delete</a>
</td>

</tr>

{% endfor %}

</table>
