<!DOCTYPE html>
<html>
<head>
<title>Add Student</title>
</head>

<body>

<h2>Add Student</h2>

<form method="POST">
{% csrf_token %}

<label>Name:</label>
<br>
<input type="text" name="name" required>
<br><br>

<label>Email:</label>
<br>
<input type="email" name="email" required>
<br><br>

<label>Phone:</label>
<br>
<input type="text" name="phone" required>
<br><br>

<button type="submit">Save</button>

</form>

<br>
<a href="/students/">View Students</a>

</body>
</html>
